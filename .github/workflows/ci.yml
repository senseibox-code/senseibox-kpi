name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Python syntax
        run: python -m compileall src
      - name: Python tests
        run: pytest
      - name: JavaScript syntax
        run: node --check static/dashboard.js
      - name: Import app
        run: python -c "from system_dashboard.app import app; print(app)"
